<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Semanal</title>

<style>
:root{
--bg:#f4f6fb;
--card:rgba(255,255,255,0.7);
--text:#111;
--accent:#2563eb;
--header:#0f172a;
}

body.dark{
--bg:#0b1220;
--card:rgba(20,25,40,0.7);
--text:#f9fafb;
--accent:#60a5fa;
--header:#020617;
}

body{
margin:0;
font-family:-apple-system, Arial;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:var(--header);
color:white;
}

.title{font-weight:900}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
padding:15px;
}

.day{
background:var(--card);
backdrop-filter: blur(15px);
border-radius:14px;
padding:10px;
min-height:150px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.day h3{margin:0;font-size:14px}

.meal{font-size:12px;margin-top:8px}
.label{color:var(--accent);font-weight:bold}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#111827;
color:white;
padding:15px;
transition:0.3s;
z-index:999;
overflow:auto;
}

.sidebar.open{left:0}

/* BUTTONS */
button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.darkBtn{background:#111;color:white}
.print{background:#3b82f6;color:white}
.edit{background:#f59e0b}

/* WEEK NAV */
.weekNav{
display:flex;
justify-content:center;
gap:15px;
padding:10px;
font-weight:bold;
}

.arrow{cursor:pointer}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

.modalContent{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

/* CHART */
canvas{background:white;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<header>
<div onclick="toggleMenu()">☰ Menú</div>
<div class="title">🍽️ Plan Semanal</div>
</header>

<div class="sidebar" id="sidebar">

<div style="display:flex;justify-content:space-between;align-items:center;">
<h3>Menú</h3>
<button onclick="toggleMenu()" style="width:auto">✕</button>
</div>

<button class="darkBtn" onclick="toggleDark()">🌙 Modo</button>
<button class="print" onclick="window.print()">🖨️ Imprimir</button>
<button class="edit" onclick="openEdit()">✏️ Cambiar</button>

<hr>

<h3>🛒 Compras</h3>
<div id="shoppingList"></div>

<h3>💰 Presupuesto</h3>
<div id="budget"></div>

<hr>

<h3>📊 Estadísticas</h3>

<button onclick="setStatsMode('general')">General</button>
<button onclick="setStatsMode('month')">Mensual</button>

<canvas id="chart" width="240" height="160"></canvas>
<div id="statsText"></div>

</div>

<div class="weekNav">
<div class="arrow" onclick="changeWeek(-1)">⬅️</div>
<div id="weekTitle"></div>
<div class="arrow" onclick="changeWeek(1)">➡️</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent">
<h3>Editar comida</h3>
<select id="daySelect"></select>
<input id="text">
<button onclick="saveEdit()">Guardar</button>
</div>
</div>

<script>

/* ---------------- DATA ---------------- */

let data = JSON.parse(localStorage.getItem("menu")) || {};
let week = 0;
let statsMode = "general";

const days=[
"Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"
];

const prices={
"Pollo":8000,
"Carne":10000,
"Milanesa":9000,
"Pescado":9000,
"Fideos":1500,
"Ñokis":2000,
"Ravioles":2500,
"Verdura":3000,
"Extras":2500
};

/* ---------------- DAY ---------------- */

function getDay(i){

let key = week+"-"+i;
if(data[key]) return data[key];

let a="Variado";
let c="Variado";

if(i===5) a="Milanesa con papas";
if(i===6){a="Asado 🔥";c="—";}

return {almuerzo:a,cena:c};
}

/* ---------------- RENDER ---------------- */

function render(){

document.getElementById("grid").innerHTML="";

for(let i=0;i<7;i++){

let d=getDay(i);

let div=document.createElement("div");
div.className="day";

div.innerHTML=`
<h3>${days[i]}</h3>
<div class="meal">
<span class="label">Almuerzo:</span> ${d.almuerzo}<br>
<span class="label">Cena:</span> ${d.cena}
</div>
`;

document.getElementById("grid").appendChild(div);
}

document.getElementById("weekTitle")="Semana "+(week+1);

renderShopping();
renderBudget();
generateStats();
}

/* ---------------- WEEK ---------------- */

function changeWeek(dir){
week+=dir;
if(week<0) week=3;
if(week>3) week=0;
render();
}

/* ---------------- MENU ---------------- */

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
}

/* ---------------- DARK ---------------- */

function toggleDark(){
document.body.classList.toggle("dark");
}

/* ---------------- EDIT ---------------- */

function openEdit(){
document.getElementById("modal").style.display="flex";

let sel=document.getElementById("daySelect");
sel.innerHTML="";

for(let i=0;i<7;i++){
sel.innerHTML+=`<option value="${i}">${days[i]}</option>`;
}
}

function saveEdit(){
let day=document.getElementById("daySelect").value;
let text=document.getElementById("text").value;

data[week+"-"+day]={almuerzo:text,cena:text};

localStorage.setItem("menu",JSON.stringify(data));
document.getElementById("modal").style.display="none";
render();
}

/* ---------------- SHOPPING ---------------- */

function renderShopping(){

let items={
Pollo:0,Carne:0,Milanesa:0,Pescado:0,Pasta:0,Verdura:0,Extras:0
};

for(let k in data){

let m=[data[k].almuerzo,data[k].cena];

m.forEach(x=>{
if(!x||x==="—") return;

if(x.includes("Pollo")) items.Pollo++;
else if(x.includes("Milanesa")||x.includes("Carne")) items.Carne++;
else if(x.includes("Pescado")) items.Pescado++;
else if(x.includes("Fideos")||x.includes("Ñokis")||x.includes("Ravioles")) items.Pasta++;
else if(x.includes("Verdura")||x.includes("Tomate")) items.Verdura++;
else items.Extras++;

});
}

let html="";
for(let i in items){
if(items[i]>0) html+=`<div>${i}: ${items[i]}</div>`;
}

document.getElementById("shoppingList").innerHTML=html;
}

/* ---------------- BUDGET ---------------- */

function renderBudget(){

let total=0;

for(let k in data){

let m=[data[k].almuerzo,data[k].cena];

m.forEach(x=>{
for(let p in prices){
if(x && x.includes(p)) total+=prices[p];
}
});

}

document.getElementById("budget").innerHTML=
"💸 $"+total.toLocaleString("es-AR");
}

/* ---------------- STATS ---------------- */

function setStatsMode(m){
statsMode=m;
generateStats();
}

function generateStats(){

let s={Carne:0,Pollo:0,Pasta:0,Pescado:0,Verdura:0,Extras:0};

for(let k in data){

let weekIndex=parseInt(k.split("-")[0]);

if(statsMode==="month" && weekIndex!==week) continue;

let m=[data[k].almuerzo,data[k].cena];

m.forEach(x=>{
if(!x) return;

if(x.includes("Pollo")) s.Pollo++;
else if(x.includes("Carne")||x.includes("Milanesa")) s.Carne++;
else if(x.includes("Pescado")) s.Pescado++;
else if(x.includes("Fideos")||x.includes("Ñokis")) s.Pasta++;
else if(x.includes("Verdura")) s.Verdura++;
else s.Extras++;

});
}

drawChart(s);
showStatsText(s);
}

/* ---------------- CHART ---------------- */

function drawChart(s){

let c=document.getElementById("chart");
let ctx=c.getContext("2d");

ctx.clearRect(0,0,300,200);

let keys=Object.keys(s);
let max=Math.max(...Object.values(s),1);

keys.forEach((k,i)=>{

let h=(s[k]/max)*120;

ctx.fillStyle=["#ef4444","#22c55e","#3b82f6","#f59e0b","#a855f7","#64748b"][i];

ctx.fillRect(i*40+10,140-h,20,h);

ctx.fillStyle="#000";
ctx.fillText(k,i*40+5,155);

});

}

render();

</script>

</body>
</html>
