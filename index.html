<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Semanal Inteligente</title>

<style>
:root{
--bg:#f4f6fb;
--card:rgba(255,255,255,0.7);
--text:#111;
--accent:#2563eb;
--header:#0f172a;
}

body.dark{
--bg:#0b1220;
--card:rgba(20,25,40,0.7);
--text:#f9fafb;
--accent:#60a5fa;
--header:#020617;
}

body{
margin:0;
font-family:-apple-system, Arial;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:var(--header);
color:white;
}

.title{font-size:22px;font-weight:900}

/* WEEK */
.weekNav{
display:flex;
justify-content:center;
gap:15px;
padding:10px;
font-weight:bold;
}

.arrow{cursor:pointer;font-size:22px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
padding:15px;
transition:0.3s;
}

body.menu-open .grid{
transform:translateX(100px);
opacity:0.6;
}

.day{
background:var(--card);
backdrop-filter: blur(15px);
border-radius:16px;
padding:12px;
min-height:160px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.day h3{margin:0;font-size:14px}

.meal{
margin-top:10px;
font-size:13px;
line-height:1.5;
}

.label{color:var(--accent);font-weight:bold}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#111827;
color:white;
padding:15px;
transition:0.3s;
overflow:auto;
z-index:999;
}

.sidebar.open{left:0}

/* BUTTONS */
button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.print{background:#3b82f6;color:white}
.edit{background:#f59e0b}
.darkBtn{background:#111;color:white}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

.modalContent{
background:white;
padding:20px;
border-radius:12px;
width:300px;
}

/* CHART */
canvas{
background:white;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div onclick="toggleMenu()">☰ Menú</div>
<div class="title">🍽️ Plan Semanal</div>
</header>

<div class="sidebar" id="sidebar">

<div style="display:flex;justify-content:space-between;align-items:center;">
<h3>Menú</h3>
<button onclick="toggleMenu()" style="width:auto">✕</button>
</div>

<button class="darkBtn" onclick="toggleDark()">🌙 Modo</button>
<button class="print" onclick="window.print()">🖨️ Imprimir</button>
<button class="edit" onclick="openEdit()">✏️ Cambiar</button>

<hr>

<h3>🛒 Compras</h3>
<div id="shoppingList"></div>

<h3>💰 Presupuesto</h3>
<div id="budget"></div>

<hr>

<h3>📊 Estadísticas</h3>

<button onclick="setStatsMode('general')">General</button>
<button onclick="setStatsMode('month')">Mensual</button>

<canvas id="chart" width="240" height="160"></canvas>
<div id="statsText"></div>

</div>

<div class="weekNav">
<div class="arrow" onclick="changeWeek(-1)">⬅️</div>
<div id="weekTitle"></div>
<div class="arrow" onclick="changeWeek(1)">➡️</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent">
<h3>Editar comida</h3>
<select id="daySelect"></select>
<input id="text">
<button onclick="saveEdit()">Guardar</button>
</div>
</div>

<script>

let week=0;
let statsMode="general";
let data=JSON.parse(localStorage.getItem("menu"))||{};

const days=[
"Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"
];

const prices={
"Pollo":8000,
"Milanesa":9000,
"Bondiola":11000,
"Pescado":9000,
"Fideos":1500,
"Ñokis":2000,
"Ravioles":2500,
"Pizza":4000,
"Empanadas":3500,
"Tacos":3000
};

/* SMART */
function smart(last){
return days;
}

function getDay(i){

let key=week+"-"+i;
if(data[key]) return data[key];

let a="Comida variada";
let c="Cena variada";

if(i===6){a="Milanesa con papas";c="—";}
if(i===0){a="Asado 🔥";c="—";}

return {almuerzo:a,cena:c};
}

/* RENDER */
function render(){

document.getElementById("grid").innerHTML="";

for(let i=0;i<7;i++){

let d=getDay(i);

let div=document.createElement("div");
div.className="day";

div.innerHTML=`
<h3>${days[i]}</h3>
<div class="meal">
<span class="label">Almuerzo:</span> ${d.almuerzo}<br>
<span class="label">Cena:</span> ${d.cena}
</div>
`;

document.getElementById("grid").appendChild(div);
}

document.getElementById("weekTitle")="Semana "+(week+1);

renderShopping();
renderBudget();
generateStats();
}

/* WEEK */
function changeWeek(dir){
week+=dir;
if(week<0) week=3;
if(week>3) week=0;
render();
}

/* MENU */
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
document.body.classList.toggle("menu-open");
}

/* DARK */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* EDIT */
function openEdit(){
document.getElementById("modal").style.display="flex";

let sel=document.getElementById("daySelect");
sel.innerHTML="";

for(let i=0;i<7;i++){
sel.innerHTML+=`<option value="${i}">${days[i]}</option>`;
}
}

function saveEdit(){
let day=document.getElementById("daySelect").value;
let text=document.getElementById("text").value;

data[week+"-"+day]={almuerzo:text,cena:text};

localStorage.setItem("menu",JSON.stringify(data));
document.getElementById("modal").style.display="none";

render();
}

/* SHOP */
function renderShopping(){

let list={};

for(let k in data){
let m=[data[k].almuerzo,data[k].cena];

m.forEach(x=>{
if(!x||x==="—")return;

for(let p in prices){
if(x.includes(p)){
list[p]=(list[p]||0)+1;
}
}
});
}

let html="";
for(let i in list){
html+=`<div>${i} x${list[i]}</div>`;
}

document.getElementById("shoppingList").innerHTML=html;
}

/* BUDGET */
function renderBudget(){

let total=0;

for(let k in data){
let m=[data[k].almuerzo,data[k].cena];

m.forEach(x=>{
for(let p in prices){
if(x.includes(p)) total+=prices[p];
}
});
}

document.getElementById("budget").innerHTML=
"💸 $"+total.toLocaleString("es-AR");
}

/* STATS */
function setStatsMode(m){
statsMode=m;
generateStats();
}

function generateStats(){

let s={Carne:0,Pollo:0,Pasta:0,Pescado:0,Otros:0};

for(let k in data){

if(statsMode==="month" && parseInt(k.split("-")[0])!==week) continue;

let m=[data[k].almuerzo,data[k].cena];

m.forEach(x=>{
if(!x) return;

if(x.includes("Pollo")) s.Pollo++;
else if(x.includes("Pescado")) s.Pescado++;
else if(x.includes("Fideos")||x.includes("Ñokis")||x.includes("Ravioles")) s.Pasta++;
else if(x.includes("Milanesa")||x.includes("Carne")||x.includes("Bondiola")) s.Carne++;
else s.Otros++;
});
}

drawChart(s);
}

/* CHART */
function drawChart(s){

let c=document.getElementById("chart");
let ctx=c.getContext("2d");

ctx.clearRect(0,0,300,200);

let keys=Object.keys(s);
let max=Math.max(...Object.values(s),1);

keys.forEach((k,i)=>{

let h=(s[k]/max)*120;

ctx.fillStyle=["#ef4444","#22c55e","#3b82f6","#f59e0b","#64748b"][i];

ctx.fillRect(i*45+10,140-h,25,h);

ctx.fillStyle="#000";
ctx.fillText(k,i*45+5,155);

});

}

render();

</script>

</body>
</html>
