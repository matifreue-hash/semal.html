<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Saludable</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fb;
color:#111;
}

header{
background:#0f172a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
padding:15px;
}

.day{
background:white;
border-radius:12px;
padding:10px;
min-height:140px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.day h3{margin:0;font-size:14px}

.meal{font-size:12px;margin-top:8px}

/* MENU */
.sidebar{
position:fixed;
top:0;
left:-300px;
width:260px;
height:100%;
background:#111827;
color:white;
padding:15px;
transition:0.3s;
overflow:auto;
z-index:999;
}

.sidebar.open{left:0}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modalContent{
background:white;
padding:20px;
border-radius:10px;
width:280px;
}
</style>
</head>

<body>

<header>
<div onclick="toggleMenu()">☰ Menú</div>
<div>🥗 Plan Saludable</div>
</header>

<div class="sidebar" id="sidebar">

<h3>Menú</h3>
<button onclick="openModal()">✏️ Cambiar comida</button>
<button onclick="toggleMenu()">Cerrar</button>

<div id="shopping"></div>
<div id="budget"></div>

</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent">

<h3>Cambiar comida</h3>

<select id="day"></select>
<input id="food" placeholder="Nueva comida">

<button onclick="saveFood()">Guardar</button>
<button onclick="closeModal()">Cancelar</button>

</div>
</div>

<script>

/* ---------------- DATA ---------------- */

let data = JSON.parse(localStorage.getItem("menu")) || {};
let week = 0;

const days=[
"Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"
];

/* ---------------- HEALTHY MENU ---------------- */

const healthyMeals = [
"Pollo al horno con verduras",
"Pescado con ensalada",
"Arroz integral con pollo",
"Tacos saludables",
"Ensalada completa con huevo",
"Fideos integrales con verduras",
"Tarta de verdura casera",
"Lentejas nutritivas"
];

const healthyDinners = [
"Sopa de verduras",
"Ensalada ligera",
"Tostadas con palta y huevo",
"Yogur con fruta",
"Verduras salteadas",
"Omelette saludable"
];

/* ---------------- FIX DAY ---------------- */

function getDay(i){

let key = week+"-"+i;
if(data[key]) return data[key];

// 🍽️ SÁBADO
if(i===5){
return {
almuerzo:"Milanesa al horno con papas",
cena:"Pizza casera / empanadas"
};
}

// 🍽️ DOMINGO
if(i===6){
return {
almuerzo:"Asado con ensalada",
cena:"Sopa ligera o ensalada"
};
}

// 🍽️ NORMAL (SALUDABLE)
return {
almuerzo: healthyMeals[Math.floor(Math.random()*healthyMeals.length)],
cena: healthyDinners[Math.floor(Math.random()*healthyDinners.length)]
};
}

/* ---------------- RENDER ---------------- */

function render(){

let grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=0;i<7;i++){

let d=getDay(i);

// 🔒 FIX undefined
if(!d.almuerzo) d.almuerzo="Comida saludable";
if(!d.cena) d.cena="Cena ligera";

let div=document.createElement("div");
div.className="day";

div.innerHTML=`
<h3>${days[i]}</h3>
<div class="meal">
<b>Almuerzo:</b> ${d.almuerzo}<br>
<b>Cena:</b> ${d.cena}
</div>
`;

grid.appendChild(div);
}

renderBudget();
renderShopping();
}

/* ---------------- MENU ---------------- */

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
}

/* ---------------- MODAL FIX ---------------- */

function openModal(){

document.getElementById("modal").style.display="flex";

let sel=document.getElementById("day");
sel.innerHTML="";

for(let i=0;i<7;i++){
sel.innerHTML+=`<option value="${i}">${days[i]}</option>`;
}

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function saveFood(){

let day=document.getElementById("day").value;
let food=document.getElementById("food").value.trim();

// 🔒 FIX undefined / vacío
if(!food){
alert("Escribí una comida válida");
return;
}

data[week+"-"+day]={almuerzo:food,cena:"Cena saludable"};

localStorage.setItem("menu",JSON.stringify(data));

closeModal();
render();
}

/* ---------------- SHOPPING ---------------- */

function renderShopping(){

let items={Pollo:0,Carne:0,Pescado:0,Pasta:0,Verdura:0};

for(let k in data){

let m=[data[k].almuerzo,data[k].cena];

m.forEach(x=>{
if(!x) return;

if(x.includes("Pollo")) items.Pollo++;
else if(x.includes("Carne")||x.includes("Milanesa")) items.Carne++;
else if(x.includes("Pescado")) items.Pescado++;
else if(x.includes("Fideos")||x.includes("Arroz")) items.Pasta++;
else items.Verdura++;

});
}

let html="";
for(let i in items){
if(items[i]>0) html+=`<div>🛒 ${i}: ${items[i]}</div>`;
}

document.getElementById("shopping").innerHTML=html;
}

/* ---------------- BUDGET ---------------- */

function renderBudget(){

let total=0;

for(let k in data){

let m=[data[k].almuerzo,data[k].cena];

m.forEach(x=>{
if(!x) return;

if(x.includes("Pollo")) total+=8000;
else if(x.includes("Carne")||x.includes("Milanesa")) total+=9000;
else if(x.includes("Pescado")) total+=9000;
else total+=3000;

});
}

document.getElementById("budget").innerHTML=
"💰 Total estimado: $"+total.toLocaleString("es-AR");
}

/* ---------------- INIT ---------------- */

render();

</script>

</body>
</html>
