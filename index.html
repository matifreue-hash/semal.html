<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Inteligente</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fb;
color:#111;
}

header{
background:#0f172a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
padding:15px;
}

.day{
background:white;
padding:10px;
border-radius:12px;
min-height:140px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.day h3{margin:0;font-size:14px}

.meal{font-size:12px;margin-top:8px}

.label{font-weight:bold;color:#2563eb}

.sidebar{
position:fixed;
top:0;
left:-300px;
width:260px;
height:100%;
background:#111827;
color:white;
padding:15px;
transition:0.3s;
overflow:auto;
z-index:999;
}

.sidebar.open{left:0}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

.modalContent{
background:white;
padding:20px;
border-radius:10px;
width:280px;
}
</style>
</head>

<body>

<header>
<div onclick="toggleMenu()">☰ Menú</div>
<div>🍽️ Plan Inteligente</div>
</header>

<div class="sidebar" id="sidebar">

<h3>Menú</h3>
<button onclick="toggleMenu()">Cerrar</button>

</div>

<div class="grid" id="grid"></div>

<script>

/* ---------------- DATA ---------------- */

let data = JSON.parse(localStorage.getItem("menu")) || {};
let week = 0;
let lastDinner = null;

/* ---------------- BASE ---------------- */

const proteins = ["pollo","carne","pescado","huevo"];

const bases = [
"arroz",
"ensalada",
"verduras salteadas",
"pasta",
"tarta de verduras"
];

const dinners = [
"sopa de verduras",
"ensalada completa",
"pollo al horno con verduras",
"pescado a la plancha con ensalada",
"tortilla de verduras",
"fideos con salsa liviana",
"empanadas al horno"
];

const days=[
"Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"
];

/* ---------------- MEAL BUILDER ---------------- */

function buildMeal(base,protein){
return `${base} con ${protein}`;
}

/* ---------------- DAY LOGIC ---------------- */

function getDay(i){

let key = week+"-"+i;
if(data[key]) return data[key];

// 🍽️ SÁBADO
if(i===5){
return {
almuerzo:"Milanesa al horno con ensalada",
cena:"Pizza casera / empanadas al horno"
};
}

// 🍽️ DOMINGO
if(i===6){
return {
almuerzo:"Asado con ensalada",
cena:"Sopa liviana o verduras"
};
}

// 🟡 MIÉRCOLES
if(i===2){

let almuerzo = buildMeal(
bases[Math.floor(Math.random()*bases.length)],
proteins[Math.floor(Math.random()*proteins.length)]
);

let cena = dinners[Math.floor(Math.random()*dinners.length)];

lastDinner = cena;

return {almuerzo, cena};
}

// 🟡 JUEVES (REUTILIZA CENA MIÉRCOLES)
if(i===3){

let almuerzo = lastDinner || buildMeal(
bases[Math.floor(Math.random()*bases.length)],
proteins[Math.floor(Math.random()*proteins.length)]
);

let cena = dinners[Math.floor(Math.random()*dinners.length)];

return {almuerzo, cena};
}

// 🔵 RESTO DE DÍAS
let almuerzo = buildMeal(
bases[Math.floor(Math.random()*bases.length)],
proteins[Math.floor(Math.random()*proteins.length)]
);

let cena = dinners[Math.floor(Math.random()*dinners.length)];

return {almuerzo, cena};
}

/* ---------------- RENDER ---------------- */

function render(){

let grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=0;i<7;i++){

let d=getDay(i);

// FIX seguridad
if(!d.almuerzo) d.almuerzo="Comida saludable";
if(!d.cena) d.cena="Cena liviana";

let div=document.createElement("div");
div.className="day";

div.innerHTML=`
<h3>${days[i]}</h3>
<div class="meal">
<span class="label">Almuerzo:</span> ${d.almuerzo}<br>
<span class="label">Cena:</span> ${d.cena}
</div>
`;

grid.appendChild(div);
}

}

/* ---------------- MENU ---------------- */

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
}

/* ---------------- INIT ---------------- */

render();

</script>

</body>
</html>
